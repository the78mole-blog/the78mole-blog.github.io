repos:
  # ── Standard file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Remove trailing whitespace; preserve intentional 2-space MD line-breaks
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # Every text file ends with exactly one newline
      - id: end-of-file-fixer

      # Abort if merge-conflict markers (<<<, ===, >>>) are present
      - id: check-merge-conflict

      # PDFs, binary blobs and STL files: allow up to 10 MB
      - id: check-added-large-files
        name: Large-file check – PDFs / bins / STLs (≤ 10 MB)
        args: [--maxkb=10240]
        files: \.(pdf|bin|stl|png)$

      # Everything else: keep the repo lean (≤ 500 kB)
      - id: check-added-large-files
        alias: check-added-large-files-other
        name: Large-file check – other files (≤ 1024 kB)
        args: [--maxkb=1024]
        exclude: \.(pdf|bin|stl|png)$

      # Validate JSON syntax (package.json, renovate.json, discussions/*.json …)
      - id: check-json
        # package-lock.json is auto-generated and huge – skip to save time
        exclude: ^package-lock\.json$

      # Validate YAML syntax (.pre-commit-config.yaml, publish.yml …)
      - id: check-yaml

      # Catch accidentally committed private keys / certificates
      - id: detect-private-key

      # Prevent file-name conflicts on case-insensitive file systems (macOS/Win)
      # – important for GitHub Pages deployments
      - id: check-case-conflict

      # Enforce LF line endings across the whole repo
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Blog-specific checks ──────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check-blog-images
        name: Check blog post images exist in public/
        language: script
        entry: scripts/check-blog-images.sh
        types: [markdown]
        files: ^content/
