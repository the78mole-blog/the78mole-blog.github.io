on:
  push:
    branches: [main]
    paths-ignore:
      # Copilot / repo-meta files – never affect the rendered site
      - '.github/copilot-instructions.md'
      - '.github/skills/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      # Giscus discussion data (imported comments, not part of the build)
      - 'discussions/**'
      # Migration & maintenance scripts (import/, MIGRATION.md, TODO_NOTIZEN.md
      # are already in .gitignore and can never trigger this workflow anyway)
      - 'scripts/**'
      # Repo documentation
      - 'README.md'
      # Dependency update bot config
      - 'renovate.json'
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/copilot-instructions.md'
      - '.github/skills/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'discussions/**'
      - 'scripts/**'
      - 'README.md'
      - 'renovate.json'
  workflow_dispatch:

name: Build & Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject StaticForms API key
        env:
          STATIC_FORMS_KEY: ${{ secrets.STATIC_FORMS_KEY }}
        run: sed -i "s|YOUR_STATICFORMS_API_KEY|${STATIC_FORMS_KEY}|g" pages/pages/contact.vue

      - name: Generate static site
        env:
          GOOGLE_ANALYTICS_MEAS_ID: ${{ vars.GOOGLE_ANALYTICS_MEAS_ID }}
          GOOGLE_ADSENSE_PUB_ID: ${{ vars.GOOGLE_ADSENSE_PUB_ID }}
          GISCUS_REPO_ID: ${{ vars.GISCUS_REPO_ID }}
          GISCUS_CATEGORY_ID: ${{ vars.GISCUS_CATEGORY_ID }}
        run: npm run generate

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ".output/public"

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: "pr-preview-${{ github.event.pull_request.number }}"
          path: ".output/public"
          retention-days: 7

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
